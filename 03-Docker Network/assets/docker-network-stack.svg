<svg width="900" height="980" viewBox="0 0 900 980" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="900" height="980" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a1a1a">Docker Network Stack — Container to Hardware</text>

  <!-- Container 1 -->
  <rect x="80" y="65" width="330" height="140" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="245" y="92" text-anchor="middle" font-size="16" font-weight="600" fill="#042C53">Container 1</text>

  <rect x="105" y="110" width="135" height="65" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="172" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Private</text>
  <text x="172" y="155" text-anchor="middle" font-size="13" fill="#085041">interface</text>

  <rect x="255" y="110" width="125" height="65" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="317" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Loopback</text>
  <text x="317" y="155" text-anchor="middle" font-size="13" fill="#085041">interface</text>

  <!-- Container 2 -->
  <rect x="490" y="65" width="330" height="140" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="655" y="92" text-anchor="middle" font-size="16" font-weight="600" fill="#042C53">Container 2</text>

  <rect x="515" y="110" width="135" height="65" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="582" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Private</text>
  <text x="582" y="155" text-anchor="middle" font-size="13" fill="#085041">interface</text>

  <rect x="665" y="110" width="125" height="65" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="727" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Loopback</text>
  <text x="727" y="155" text-anchor="middle" font-size="13" fill="#085041">interface</text>

  <!-- arrows containers -> virtual interfaces -->
  <line x1="172" y1="205" x2="172" y2="270" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="220" y1="270" x2="220" y2="205" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="582" y1="205" x2="582" y2="270" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="630" y1="270" x2="630" y2="205" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- OS network stack outer box -->
  <rect x="40" y="270" width="820" height="560" rx="22" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
  <text x="65" y="305" font-size="15" font-weight="600" fill="#2C2C2A">Operating system network stack</text>
  <text x="65" y="326" font-size="13" fill="#444441">(host interface)</text>

  <!-- Container virtual interfaces -->
  <rect x="80" y="350" width="290" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/>
  <text x="225" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Container 1 virtual interface</text>

  <rect x="530" y="350" width="290" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.1"/>
  <text x="675" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Container 2 virtual interface</text>

  <!-- arrows virtual interfaces -> bridge -->
  <line x1="195" y1="420" x2="195" y2="475" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="255" y1="475" x2="255" y2="420" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="645" y1="420" x2="645" y2="475" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="705" y1="475" x2="705" y2="420" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Docker bridge -->
  <rect x="80" y="475" width="740" height="75" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="450" y="507" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">Docker bridge virtual interface</text>
  <text x="450" y="528" text-anchor="middle" font-size="13" fill="#712B13">docker0</text>

  <!-- arrows bridge -> logical host -->
  <line x1="255" y1="550" x2="255" y2="605" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="645" y1="605" x2="645" y2="550" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Logical host interface -->
  <rect x="80" y="605" width="740" height="75" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="450" y="637" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">Logical host interface</text>
  <text x="450" y="658" text-anchor="middle" font-size="13" fill="#712B13">ens33</text>

  <!-- arrows logical host -> VM host (exiting OS box) -->
  <line x1="255" y1="790" x2="255" y2="845" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="645" y1="845" x2="645" y2="790" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- VM host interface -->
  <rect x="80" y="845" width="740" height="65" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text x="450" y="884" text-anchor="middle" font-size="15" font-weight="600" fill="#412402">VM host interface</text>

  <!-- arrows VM host -> physical host -->
  <line x1="255" y1="910" x2="255" y2="945" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="645" y1="945" x2="645" y2="910" stroke="#444444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Physical host interface -->
  <rect x="80" y="935" width="740" height="40" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text x="450" y="960" text-anchor="middle" font-size="15" font-weight="600" fill="#412402">Physical host interface</text>

</svg>
